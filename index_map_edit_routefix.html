<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6750a4">
  <title>나만의 여행 기록</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  </script>
  <style>
    :root {
      --primary: #6750a4;
      --primary-dark: #4f378b;
      --primary-soft: #f0eaff;
      --bg: #f7f7fb;
      --card: #ffffff;
      --text: #25232a;
      --muted: #716d79;
      --line: #e5e1e9;
      --danger: #ba1a1a;
      --success: #237a45;
      --shadow: 0 12px 35px rgba(44, 39, 56, 0.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Malgun Gothic", system-ui, sans-serif;
      background: linear-gradient(180deg, #f2edff 0, var(--bg) 280px);
      color: var(--text);
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }
    .screen { display: none; }
    .screen.active { display: block; }

    .app-shell { width: min(960px, 100%); margin: 0 auto; padding: 20px; }
    .card {
      background: var(--card);
      border: 1px solid rgba(103, 80, 164, 0.09);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    /* 로딩 */
    #loading-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: var(--primary-dark);
      font-weight: 700;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #ddd3f7;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 로그인 */
    #screen-auth { max-width: 480px; margin: 7vh auto 0; padding: 34px; }
    .brand { text-align: center; margin-bottom: 26px; }
    .brand-icon { font-size: 48px; }
    .brand h1 { margin: 8px 0 6px; font-size: 28px; }
    .brand p { margin: 0; color: var(--muted); line-height: 1.55; }
    .auth-tabs { display: flex; background: #f2eff7; border-radius: 12px; padding: 4px; margin-bottom: 20px; }
    .auth-tab { flex: 1; border: 0; padding: 11px; border-radius: 9px; background: transparent; color: var(--muted); font-weight: 700; }
    .auth-tab.active { background: white; color: var(--primary); box-shadow: 0 2px 9px rgba(50, 42, 68, .08); }
    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 7px; }
    .field input, .field select, .field textarea {
      width: 100%; border: 1px solid var(--line); background: white; border-radius: 11px;
      padding: 12px 13px; outline: none; transition: .2s;
    }
    .field textarea { min-height: 90px; resize: vertical; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(103,80,164,.12); }
    .help { color: var(--muted); font-size: 12px; line-height: 1.5; margin-top: 6px; }
    .primary-btn, .secondary-btn, .danger-btn, .ghost-btn {
      border: 0; border-radius: 11px; padding: 12px 16px; font-weight: 800;
    }
    .primary-btn { background: var(--primary); color: white; }
    .primary-btn:hover { background: var(--primary-dark); }
    .secondary-btn { background: var(--primary-soft); color: var(--primary-dark); }
    .ghost-btn { background: transparent; color: var(--muted); border: 1px solid var(--line); }
    .danger-btn { background: #ffdad6; color: var(--danger); }
    .full { width: 100%; }
    .text-btn { border: 0; background: transparent; color: var(--primary); padding: 8px 0; font-weight: 700; }
    .auth-footer { text-align: center; margin-top: 10px; }

    /* 상단 */
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 2px 22px; }
    .topbar h1 { margin: 0; font-size: 24px; }
    .user-area { display: flex; align-items: center; gap: 9px; }
    .user-email { color: var(--muted); font-size: 13px; max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* 여행 목록 */
    .hero { padding: 24px; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; gap: 15px; }
    .hero h2 { margin: 0 0 7px; }
    .hero p { margin: 0; color: var(--muted); }
    .trip-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
    .trip-card { padding: 20px; min-height: 190px; display: flex; flex-direction: column; position: relative; overflow: hidden; transition: transform .18s, box-shadow .18s; }
    .trip-card:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(44,39,56,.14); }
    .trip-card::before { content: ""; position: absolute; width: 130px; height: 130px; border-radius: 50%; background: var(--primary-soft); right: -45px; top: -55px; }
    .trip-card h3 { margin: 10px 0 7px; font-size: 20px; position: relative; }
    .destination { color: var(--primary-dark); font-weight: 700; position: relative; }
    .dates { color: var(--muted); font-size: 14px; margin-top: 8px; position: relative; }
    .trip-card-bottom { margin-top: auto; display: flex; justify-content: space-between; align-items: center; position: relative; }
    .status-chip { display: inline-flex; padding: 6px 10px; border-radius: 99px; background: #edf7ef; color: var(--success); font-size: 12px; font-weight: 800; }
    .open-link { color: var(--primary); font-weight: 800; }
    .empty { padding: 45px 25px; text-align: center; color: var(--muted); grid-column: 1 / -1; }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }

    /* 여행 상세 */
    .planner-header { padding: 22px; margin-bottom: 16px; }
    .planner-header-row { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; }
    .planner-header h2 { margin: 8px 0 5px; font-size: 27px; }
    .planner-meta { color: var(--muted); }
    .back-btn { border: 0; background: transparent; color: var(--primary); padding: 0; font-weight: 800; }
    .tabs-wrap { overflow-x: auto; padding-bottom: 5px; }
    .tabs { display: flex; gap: 8px; min-width: max-content; margin: 18px 0 4px; }
    .tab-btn { border: 1px solid var(--line); background: white; color: var(--muted); padding: 10px 14px; border-radius: 99px; font-weight: 800; }
    .tab-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .day-panel { padding: 20px; }
    .day-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
    .day-toolbar h3 { margin: 0; }
    .plan-list { display: grid; gap: 10px; }
    .plan-item { display: grid; grid-template-columns: 68px 1fr; gap: 13px; padding: 16px; border: 1px solid var(--line); border-radius: 14px; background: #fff; }
    .time { color: var(--primary); font-weight: 900; }
    .place { font-size: 17px; font-weight: 850; margin-bottom: 5px; }
    .plan-sub { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .memo { margin-top: 6px; color: #504a58; white-space: pre-wrap; }
    .plan-actions { display:flex; gap:7px; margin-top:10px; flex-wrap:wrap; }
    .mini-btn { border:1px solid var(--line); background:white; color:var(--primary-dark); border-radius:9px; padding:7px 10px; font-size:12px; font-weight:800; }
    .mini-btn.danger { color:var(--danger); background:#fff7f6; }
    .empty-day { padding: 35px 15px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 14px; }
    .map-card { margin-bottom: 14px; }
    #map { width: 100%; height: 330px; border-radius: 16px; background: #ece8f2; }
    #route-summary { margin-top: 10px; color: var(--muted); font-size: 13px; line-height: 1.55; }
    #place-autocomplete-host { min-height: 48px; }
    gmp-place-autocomplete { width: 100%; }
    .selected-place { margin-top: 8px; padding: 10px 12px; border-radius: 10px; background: var(--primary-soft); color: var(--primary-dark); font-size: 13px; }
    .place-help { margin-top: 6px; color: var(--muted); font-size: 12px; }


    /* 모달 */
    .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(22,18,28,.52); padding: 20px; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal-box { width: min(520px, 100%); max-height: 92vh; overflow-y: auto; background: white; border-radius: 20px; padding: 23px; box-shadow: 0 20px 60px rgba(0,0,0,.24); }
    .modal-box h3 { margin: 0 0 18px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 9px; margin-top: 18px; }

    /* 메시지 */
    #toast { position: fixed; left: 50%; bottom: 25px; transform: translateX(-50%) translateY(30px); opacity: 0; pointer-events: none; background: #29252f; color: white; padding: 12px 17px; border-radius: 12px; z-index: 2000; transition: .25s; max-width: calc(100vw - 40px); text-align: center; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: var(--danger); }
    .inline-message { display: none; padding: 11px 13px; border-radius: 10px; margin-bottom: 14px; font-size: 14px; line-height: 1.5; }
    .inline-message.show { display: block; }
    .inline-message.error { background: #ffdad6; color: #760000; }
    .inline-message.success { background: #dff5e5; color: #155c33; }

    @media (max-width: 640px) {
      .app-shell { padding: 13px; }
      #screen-auth { margin-top: 3vh; padding: 25px 20px; }
      .topbar { align-items: flex-start; }
      .user-area { flex-direction: column; align-items: flex-end; }
      .user-email { max-width: 175px; }
      .hero { flex-direction: column; align-items: stretch; }
      .hero .primary-btn { width: 100%; }
      .planner-header-row { flex-direction: column; }
      .form-grid { grid-template-columns: 1fr; }
      .plan-item { grid-template-columns: 58px 1fr; }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <div>로그인 상태 확인 중...</div>
  </div>

  <main id="app" class="app-shell hidden">
    <!-- 로그인/회원가입 -->
    <section id="screen-auth" class="screen card">
      <div class="brand">
        <div class="brand-icon">✈️</div>
        <h1>나만의 여행 기록</h1>
        <p>여행 전에는 계획하고,<br>다녀온 뒤에는 나만의 추억으로 보관해.</p>
      </div>

      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" type="button" onclick="switchAuthMode('login')">로그인</button>
        <button id="tab-signup" class="auth-tab" type="button" onclick="switchAuthMode('signup')">회원가입</button>
      </div>

      <div id="auth-message" class="inline-message"></div>

      <form id="auth-form">
        <div class="field">
          <label for="auth-email">이메일</label>
          <input id="auth-email" type="email" autocomplete="email" placeholder="example@email.com" required>
        </div>
        <div class="field">
          <label for="auth-password">비밀번호</label>
          <input id="auth-password" type="password" autocomplete="current-password" minlength="6" placeholder="6자 이상" required>
          <div id="password-help" class="help hidden">회원가입 비밀번호는 6자 이상으로 입력해.</div>
        </div>
        <div id="confirm-field" class="field hidden">
          <label for="auth-password-confirm">비밀번호 확인</label>
          <input id="auth-password-confirm" type="password" autocomplete="new-password" minlength="6" placeholder="비밀번호를 한 번 더 입력">
        </div>
        <button id="auth-submit" class="primary-btn full" type="submit">로그인</button>
      </form>

      <div class="auth-footer">
        <button id="reset-password-btn" class="text-btn" type="button" onclick="sendPasswordReset()">비밀번호를 잊었어</button>
      </div>
    </section>

    <!-- 여행 목록 -->
    <section id="screen-trips" class="screen">
      <header class="topbar">
        <h1>나의 여행 ✈️</h1>
        <div class="user-area">
          <span id="user-email" class="user-email"></span>
          <button class="ghost-btn" type="button" onclick="logout()">로그아웃</button>
        </div>
      </header>

      <div class="hero card">
        <div>
          <h2>어디로 떠날까?</h2>
          <p>새 여행을 만들고 일정과 추억을 차곡차곡 기록해.</p>
        </div>
        <button class="primary-btn" type="button" onclick="openTripModal()">+ 새 여행</button>
      </div>

      <div id="trip-grid" class="trip-grid"></div>
    </section>

    <!-- 여행 상세 -->
    <section id="screen-planner" class="screen">
      <header class="topbar">
        <button class="back-btn" type="button" onclick="goBackToTrips()">← 여행 목록</button>
        <div class="user-area">
          <span id="planner-user-email" class="user-email"></span>
          <button class="ghost-btn" type="button" onclick="logout()">로그아웃</button>
        </div>
      </header>

      <div class="planner-header card">
        <div class="planner-header-row">
          <div>
            <div id="trip-destination" class="destination"></div>
            <h2 id="trip-title">여행</h2>
            <div id="trip-meta" class="planner-meta"></div>
          </div>
          <button class="danger-btn" type="button" onclick="deleteCurrentTrip()">여행 삭제</button>
        </div>
        <div class="tabs-wrap"><div id="day-tabs" class="tabs"></div></div>
      </div>

      <div class="day-panel card">
        <div class="map-card">
          <div id="map"></div>
          <div id="route-summary">지도에 표시할 장소를 일정에 추가해 줘.</div>
        </div>
        <div class="day-toolbar">
          <h3 id="day-title">일정</h3>
          <button class="primary-btn" type="button" onclick="openItemModal()">+ 일정 추가</button>
        </div>
        <div id="plan-list" class="plan-list"></div>
      </div>
    </section>
  </main>

  <!-- 새 여행 모달 -->
  <div id="trip-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="trip-modal-title">
    <div class="modal-box">
      <h3 id="trip-modal-title">새 여행 만들기</h3>
      <form id="trip-form">
        <div class="field">
          <label for="trip-input-title">여행 제목 *</label>
          <input id="trip-input-title" type="text" maxlength="80" placeholder="예: 2026 나트랑 가족여행" required>
        </div>
        <div class="field">
          <label for="trip-input-destination">여행지</label>
          <input id="trip-input-destination" type="text" maxlength="80" placeholder="예: 나트랑, 베트남">
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="trip-input-start">시작일</label>
            <input id="trip-input-start" type="date">
          </div>
          <div class="field">
            <label for="trip-input-end">종료일</label>
            <input id="trip-input-end" type="date">
          </div>
        </div>
        <div class="field">
          <label for="trip-input-currency">기본 통화</label>
          <select id="trip-input-currency">
            <option value="KRW">KRW · 원</option>
            <option value="JPY">JPY · 엔</option>
            <option value="VND">VND · 동</option>
            <option value="USD">USD · 달러</option>
            <option value="EUR">EUR · 유로</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="ghost-btn" type="button" onclick="closeModal('trip-modal')">취소</button>
          <button class="primary-btn" type="submit">여행 만들기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 일정 추가 모달 -->
  <div id="item-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="item-modal-title">
    <div class="modal-box">
      <h3 id="item-modal-title">일정 추가</h3>
      <form id="item-form">
        <div class="form-grid">
          <div class="field">
            <label for="item-input-date">날짜</label>
            <input id="item-input-date" type="date">
          </div>
          <div class="field">
            <label for="item-input-time">시간</label>
            <input id="item-input-time" type="time">
          </div>
        </div>
        <div class="field">
          <label>Google 장소 검색 *</label>
          <div id="place-autocomplete-host"></div>
          <input id="item-input-place" type="hidden">
          <div id="selected-place" class="selected-place hidden"></div>
          <div class="place-help">검색 결과에서 장소를 하나 선택해야 지도와 동선에 표시돼.</div>
        </div>
        <div class="field">
          <label for="item-input-travel-mode">이 장소에서 다음 장소까지 이동수단</label>
          <select id="item-input-travel-mode">
            <option value="DRIVING">자동차</option>
            <option value="WALKING">도보</option>
            <option value="TRANSIT">대중교통</option>
            <option value="BICYCLING">자전거</option>
          </select>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="item-input-cost">예상 비용</label>
            <input id="item-input-cost" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
          </div>
          <div class="field">
            <label for="item-input-currency">통화</label>
            <select id="item-input-currency">
              <option value="KRW">KRW · 원</option>
              <option value="JPY">JPY · 엔</option>
              <option value="VND">VND · 동</option>
              <option value="USD">USD · 달러</option>
              <option value="EUR">EUR · 유로</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="item-input-memo">메모</label>
          <textarea id="item-input-memo" maxlength="1000" placeholder="예약 정보, 준비물, 참고사항 등을 적어줘."></textarea>
        </div>
        <div class="modal-actions">
          <button class="ghost-btn" type="button" onclick="closeModal('item-modal')">취소</button>
          <button id="item-submit-btn" class="primary-btn" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // 공개되어도 되는 Supabase anon key입니다. 실제 보안은 Auth + RLS가 담당합니다.
    const SUPABASE_URL = 'https://pbzwcsaveufsqbmhygon.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiendjc2F2ZXVmc3FibWh5Z29uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTQ2MTgsImV4cCI6MjA5MDc3MDYxOH0.sq8gWEF7ntiA3pL9DeDQ59rVNuDzXBkJSDJmC2OHIOE';
    const supabaseApp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let authMode = 'login';
    let currentUser = null;
    let currentTrip = null;
    let currentDayNumber = 1;
    let tripsCache = [];
    let itemsCache = [];
    let authReady = false;
    let map = null;
    let mapMarkers = [];
    let mapPolylines = [];
    let selectedGooglePlace = null;
    let PlaceClass = null;
    let RouteClass = null;
    let editingItemId = null;

    const STATUS_LABELS = {
      planning: '계획 중',
      traveling: '여행 중',
      completed: '다녀온 여행',
      archived: '보관됨'
    };

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('auth-form').addEventListener('submit', handleAuthSubmit);
      document.getElementById('trip-form').addEventListener('submit', createTrip);
      document.getElementById('item-form').addEventListener('submit', createItineraryItem);
      initGoogleFeatures();

      document.querySelectorAll('.modal').forEach(modal => {
        modal.addEventListener('click', event => {
          if (event.target === modal) closeModal(modal.id);
        });
      });

      supabaseApp.auth.onAuthStateChange((event, session) => {
        currentUser = session?.user ?? null;
        if (!authReady || event === 'SIGNED_IN' || event === 'SIGNED_OUT' || event === 'USER_UPDATED') {
          authReady = true;
          renderForSession();
        }
      });
    });

    async function renderForSession() {

    function switchAuthMode(mode) {
      authMode = mode;
      const signup = mode === 'signup';
      document.getElementById('tab-login').classList.toggle('active', !signup);
      document.getElementById('tab-signup').classList.toggle('active', signup);
      document.getElementById('confirm-field').classList.toggle('hidden', !signup);
      document.getElementById('password-help').classList.toggle('hidden', !signup);
      document.getElementById('reset-password-btn').classList.toggle('hidden', signup);
      document.getElementById('auth-submit').textContent = signup ? '회원가입' : '로그인';
      document.getElementById('auth-password').autocomplete = signup ? 'new-password' : 'current-password';
      clearAuthMessage();
    }

    async function handleAuthSubmit(event) {
      event.preventDefault();
      clearAuthMessage();
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const submitButton = document.getElementById('auth-submit');

      if (!email || !password) return showAuthMessage('이메일과 비밀번호를 입력해.', 'error');
      if (password.length < 6) return showAuthMessage('비밀번호는 6자 이상이어야 해.', 'error');

      submitButton.disabled = true;
      submitButton.textContent = '처리 중...';

      try {
        if (authMode === 'signup') {
          const confirm = document.getElementById('auth-password-confirm').value;
          if (password !== confirm) throw new Error('비밀번호 확인이 일치하지 않아.');

          const { data, error } = await supabaseApp.auth.signUp({
            email,
            password,
            options: { emailRedirectTo: window.location.origin + window.location.pathname }
          });
          if (error) throw error;

          if (data.session) {
            showToast('회원가입과 로그인이 완료됐어.');
          } else {
            showAuthMessage('가입 확인 이메일을 보냈어. 메일의 인증 링크를 누른 뒤 로그인해.', 'success');
            switchAuthMode('login');
            showAuthMessage('가입 확인 이메일을 보냈어. 메일의 인증 링크를 누른 뒤 로그인해.', 'success');
          }
        } else {
          const { error } = await supabaseApp.auth.signInWithPassword({ email, password });
          if (error) throw error;
        }
      } catch (error) {
        showAuthMessage(toKoreanAuthError(error), 'error');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = authMode === 'signup' ? '회원가입' : '로그인';
      }
    }

    async function sendPasswordReset() {
      clearAuthMessage();
      const email = document.getElementById('auth-email').value.trim();
      if (!email) return showAuthMessage('먼저 이메일을 입력해.', 'error');

      const { error } = await supabaseApp.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname
      });
      if (error) return showAuthMessage(toKoreanAuthError(error), 'error');
      showAuthMessage('비밀번호 재설정 메일을 보냈어.', 'success');
    }

    async function logout() {
      const { error } = await supabaseApp.auth.signOut();
      if (error) showToast('로그아웃하지 못했어: ' + error.message, true);
      history.replaceState({}, '', window.location.pathname);

    function showAuthMessage(message, type) {
      const box = document.getElementById('auth-message');
      box.textContent = message;
      box.className = `inline-message show ${type}`;
    }
    function clearAuthMessage() {
      const box = document.getElementById('auth-message');
      box.textContent = '';
      box.className = 'inline-message';
    }
    function toKoreanAuthError(error) {
      const message = String(error?.message || error || '알 수 없는 오류');
      const lower = message.toLowerCase();
      if (lower.includes('invalid login credentials')) return '이메일 또는 비밀번호가 맞지 않아.';
      if (lower.includes('email not confirmed')) return '이메일 인증이 아직 완료되지 않았어. 받은 메일을 확인해.';
      if (lower.includes('user already registered')) return '이미 가입된 이메일이야. 로그인해 줘.';
      if (lower.includes('password should be')) return '비밀번호가 너무 짧아. 6자 이상으로 입력해.';
      if (lower.includes('rate limit')) return '요청이 너무 많아. 잠시 후 다시 시도해.';
      return message;
    }

    async function loadTrips() {
      const grid = document.getElementById('trip-grid');
      grid.innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto 12px"></div>여행 목록 불러오는 중...</div>';

      const { data, error } = await supabaseApp
        .from('trips')
        .select('*')
        .order('start_date', { ascending: false, nullsFirst: false })
        .order('created_at', { ascending: false });

      if (error) {
        grid.innerHTML = '<div class="empty">여행을 불러오지 못했어.</div>';
        return showToast('여행 목록 오류: ' + error.message, true);
      }

      tripsCache = data || [];
      renderTrips();
    }

    function renderTrips() {
      const grid = document.getElementById('trip-grid');
      grid.replaceChildren();

      if (!tripsCache.length) {
        const empty = document.createElement('div');
        empty.className = 'empty card';
        empty.innerHTML = '<div class="empty-icon">🧳</div><strong>아직 만든 여행이 없어.</strong><br><span>위의 “새 여행”을 눌러 첫 여행을 만들어 봐.</span>';
        grid.appendChild(empty);
        return;
      }

      tripsCache.forEach(trip => {
        const card = document.createElement('article');
        card.className = 'trip-card card';
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.addEventListener('click', () => openTrip(trip.id));
        card.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') openTrip(trip.id);
        });

        const destination = document.createElement('div');
        destination.className = 'destination';
        destination.textContent = trip.destination || '여행지 미정';

        const title = document.createElement('h3');
        title.textContent = trip.title;

        const dates = document.createElement('div');
        dates.className = 'dates';
        dates.textContent = formatTripDates(trip.start_date, trip.end_date);

        const bottom = document.createElement('div');
        bottom.className = 'trip-card-bottom';
        const status = document.createElement('span');
        status.className = 'status-chip';
        status.textContent = STATUS_LABELS[trip.status] || trip.status;
        const open = document.createElement('span');
        open.className = 'open-link';
        open.textContent = '열기 →';
        bottom.append(status, open);

        card.append(destination, title, dates, bottom);
        grid.appendChild(card);
      });
    }

    function openTripModal() {

    async function createTrip(event) {
      event.preventDefault();
      const title = document.getElementById('trip-input-title').value.trim();
      const destination = document.getElementById('trip-input-destination').value.trim();
      const startDate = document.getElementById('trip-input-start').value || null;
      const endDate = document.getElementById('trip-input-end').value || null;
      const currency = document.getElementById('trip-input-currency').value;
      const submit = event.submitter;

      if (!title) return showToast('여행 제목을 입력해.', true);
      if (startDate && endDate && startDate > endDate) return showToast('종료일은 시작일보다 빠를 수 없어.', true);

      submit.disabled = true;
      submit.textContent = '만드는 중...';

      const { data, error } = await supabaseApp
        .from('trips')
        .insert({
          owner_id: currentUser.id,
          title,
          destination: destination || null,
          start_date: startDate,
          end_date: endDate,
          default_currency: currency
        })
        .select()
        .single();

      submit.disabled = false;
      submit.textContent = '여행 만들기';

      if (error) return showToast('여행 생성 실패: ' + error.message, true);
      closeModal('trip-modal');
      showToast('새 여행을 만들었어.');
      await openTrip(data.id);
    }

    async function openTrip(tripId, updateUrl = true) {
      const { data, error } = await supabaseApp
        .from('trips')
        .select('*')
        .eq('id', tripId)
        .single();

      if (error || !data) {
        history.replaceState({}, '', window.location.pathname);
        showScreen('screen-trips');
        await loadTrips();
        return showToast('이 여행을 찾을 수 없거나 접근 권한이 없어.', true);
      }

      currentTrip = data;
      currentDayNumber = 1;
      document.getElementById('trip-title').textContent = data.title;
      document.getElementById('trip-destination').textContent = data.destination || '여행지 미정';
      document.getElementById('trip-meta').textContent = `${formatTripDates(data.start_date, data.end_date)} · ${data.default_currency}`;
      document.getElementById('item-input-currency').value = data.default_currency || 'KRW';

      if (updateUrl) history.replaceState({}, '', `?trip=${encodeURIComponent(data.id)}`);
      showScreen('screen-planner');
      renderDayTabs();
      await loadItineraryItems();
    }

    function goBackToTrips() {
      currentTrip = null;
      history.replaceState({}, '', window.location.pathname);
      showScreen('screen-trips');
      loadTrips();

    function getTripDayCount() {
      if (!currentTrip?.start_date || !currentTrip?.end_date) return 4;
      const start = parseLocalDate(currentTrip.start_date);
      const end = parseLocalDate(currentTrip.end_date);
      return Math.max(1, Math.round((end - start) / 86400000) + 1);
    }

    function renderDayTabs() {
      const tabs = document.getElementById('day-tabs');
      tabs.replaceChildren();
      const count = getTripDayCount();

      for (let day = 1; day <= count; day++) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'tab-btn' + (day === currentDayNumber ? ' active' : '');
        button.textContent = getDayTabLabel(day);
        button.addEventListener('click', () => selectDay(day));
        tabs.appendChild(button);
      }
      updateDayTitle();
    }

    function selectDay(day) {
      currentDayNumber = day;
      renderDayTabs();
      renderCurrentDayItems();
      renderCurrentDayMap();
    }

    function getDayTabLabel(day) {
      if (!currentTrip?.start_date) return `${day}일차`;
      const date = parseLocalDate(currentTrip.start_date);
      date.setDate(date.getDate() + day - 1);
      return `${day}일차 · ${date.getMonth() + 1}/${date.getDate()}`;
    }

    function updateDayTitle() {
      document.getElementById('day-title').textContent = `${getDayTabLabel(currentDayNumber)} 일정`;
    }

    async function loadItineraryItems() {
      document.getElementById('plan-list').innerHTML = '<div class="empty-day">일정을 불러오는 중...</div>';
      const { data, error } = await supabaseApp
        .from('itinerary_items')
        .select('*')
        .eq('trip_id', currentTrip.id)

        document.getElementById('plan-list').innerHTML = '<div class="empty-day">일정을 불러오지 못했어.</div>';
        return showToast('일정 불러오기 오류: ' + error.message, true);

    function renderCurrentDayItems() {
      updateDayTitle();
      const list = document.getElementById('plan-list');
      list.replaceChildren();
      const items = itemsCache.filter(item => item.day_number === currentDayNumber);

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-day';
        empty.textContent = '아직 등록된 일정이 없어. “일정 추가”를 눌러 만들어 봐.';
        list.appendChild(empty);

      items.forEach(item => {
        const row = document.createElement('article');
        row.className = 'plan-item';

        const time = document.createElement('div');
        time.className = 'time';
        time.textContent = item.start_time ? item.start_time.slice(0, 5) : '시간 미정';

        const details = document.createElement('div');
        const place = document.createElement('div');
        place.className = 'place';
        place.textContent = item.place_name;

        const sub = document.createElement('div');
        sub.className = 'plan-sub';
        const parts = [];
        if (item.schedule_date) parts.push(formatKoreanDate(item.schedule_date));
        if (Number(item.estimated_cost) > 0) parts.push(`예상 ${formatMoney(item.estimated_cost, item.currency)}`);
        sub.textContent = parts.join(' · ');

        details.appendChild(place);
        if (parts.length) details.appendChild(sub);
        if (item.memo) {
          const memo = document.createElement('div');
          memo.className = 'memo plan-sub';
          memo.textContent = item.memo;
          details.appendChild(memo);

        const actions = document.createElement('div');
        actions.className = 'plan-actions';
        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'mini-btn';

        editBtn.addEventListener('click', () => openEditItemModal(item.id));
        const deleteBtn = document.createElement('button');
        deleteBtn.type = 'button';
        deleteBtn.className = 'mini-btn danger';
        deleteBtn.textContent = '삭제';
        deleteBtn.addEventListener('click', () => deleteItineraryItem(item.id));
        actions.append(editBtn, deleteBtn);
        details.appendChild(actions);

        row.append(time, details);
        list.appendChild(row);

    async function createItineraryItem(event) {
      event.preventDefault();
      if (!currentTrip) return;
      const place = document.getElementById('item-input-place').value.trim();
      const scheduleDate = document.getElementById('item-input-date').value || null;
      const startTime = document.getElementById('item-input-time').value || null;
      const estimatedCost = Number(document.getElementById('item-input-cost').value || 0);
      const currency = document.getElementById('item-input-currency').value;
      const memo = document.getElementById('item-input-memo').value.trim();
      const travelMode = document.getElementById('item-input-travel-mode').value;
      const submit = event.submitter;

      if (!place || !selectedGooglePlace) return showToast('Google 검색 결과에서 장소를 선택해.', true);
      if (estimatedCost < 0) return showToast('비용은 0 이상이어야 해.', true);

      submit.disabled = true;
      submit.textContent = editingItemId ? '수정 중...' : '저장 중...';

      const payload = {
        trip_id: currentTrip.id,
        day_number: currentDayNumber,
        schedule_date: scheduleDate,
        start_time: startTime,
        place_name: place,
        address: selectedGooglePlace.address || null,
        google_place_id: selectedGooglePlace.id || null,
        latitude: selectedGooglePlace.lat,
        longitude: selectedGooglePlace.lng,
        travel_mode: travelMode,
        estimated_cost: estimatedCost,
        currency,
        memo: memo || null
      };

      let result;
      if (editingItemId) {
        result = await supabaseApp.from('itinerary_items').update(payload).eq('id', editingItemId);
      } else {
        result = await supabaseApp.from('itinerary_items').insert(payload);
      }

      submit.disabled = false;
      submit.textContent = editingItemId ? '수정 저장' : '저장';

      if (result.error) return showToast(`일정 ${editingItemId ? '수정' : '저장'} 실패: ` + result.error.message, true);
      const wasEditing = Boolean(editingItemId);
      editingItemId = null;
      closeModal('item-modal');
      showToast(wasEditing ? '일정을 수정했어.' : '일정을 저장했어.');
      await loadItineraryItems();
    }

    async function initGoogleFeatures() {
      try {
        const [{ Map }, placesLib, routesLib] = await Promise.all([
          google.maps.importLibrary('maps'),
          google.maps.importLibrary('places'),
          google.maps.importLibrary('routes')
        ]);
        PlaceClass = placesLib.Place;
        RouteClass = routesLib.Route;
        map = new Map(document.getElementById('map'), {
          center: { lat: 36.5, lng: 127.8 },
          zoom: 6,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: true
        });

        const autocomplete = new placesLib.PlaceAutocompleteElement();
        autocomplete.placeholder = '호텔, 식당, 관광지 등을 검색해';
        document.getElementById('place-autocomplete-host').replaceChildren(autocomplete);
        autocomplete.addEventListener('gmp-select', async event => {
          try {
            const place = event.placePrediction.toPlace();
            await place.fetchFields({ fields: ['id', 'displayName', 'formattedAddress', 'location'] });
            if (!place.location) throw new Error('장소 좌표를 찾지 못했어.');
            selectedGooglePlace = {
              id: place.id,
              name: place.displayName || place.formattedAddress,
              address: place.formattedAddress || '',
              lat: place.location.lat(),
              lng: place.location.lng()
            };
            document.getElementById('item-input-place').value = selectedGooglePlace.name;
            const box = document.getElementById('selected-place');
            box.textContent = `선택됨: ${selectedGooglePlace.name}`;
            box.classList.remove('hidden');
          } catch (error) {
            showToast('장소 정보를 가져오지 못했어: ' + error.message, true);
          }
        });
      } catch (error) {
        document.getElementById('route-summary').textContent = 'Google 지도를 불러오지 못했어. API 설정과 도메인 제한을 확인해 줘.';
        console.error(error);
      }
    }

    function clearMapOverlays() {
      mapMarkers.forEach(marker => marker.setMap(null));
      mapMarkers = [];
      mapPolylines.forEach(polyline => polyline.setMap(null));
      mapPolylines = [];
    }

    async function renderCurrentDayMap() {
      if (!map) return;
      clearMapOverlays();
      const summary = document.getElementById('route-summary');
      const items = itemsCache
        .filter(item => item.day_number === currentDayNumber && item.latitude != null && item.longitude != null)
        .sort((a, b) => String(a.start_time || '99:99').localeCompare(String(b.start_time || '99:99')));

      if (!items.length) {
        summary.textContent = '이 날짜에는 지도에 표시할 장소가 아직 없어.';
        return;
      }

      const bounds = new google.maps.LatLngBounds();
      items.forEach((item, index) => {
        const position = { lat: Number(item.latitude), lng: Number(item.longitude) };
        bounds.extend(position);
        const marker = new google.maps.Marker({
          map,
          position,
          label: String(index + 1),
          title: item.place_name
        });
        mapMarkers.push(marker);
      });
      map.fitBounds(bounds);
      if (items.length === 1) map.setZoom(15);

      if (items.length < 2 || !RouteClass) {
        summary.textContent = `장소 ${items.length}개를 지도에 표시했어.`;
        return;
      }

      const segmentTexts = [];
      for (let i = 0; i < items.length - 1; i++) {
        const from = items[i];
        const to = items[i + 1];
        try {
          const origin = { lat: Number(from.latitude), lng: Number(from.longitude) };
          const destination = { lat: Number(to.latitude), lng: Number(to.longitude) };
          // Maps JavaScript API의 Route 클래스는 REST Routes API와 값 이름이 다르다.
          // 여기서는 DRIVING / WALKING / TRANSIT / BICYCLING 값을 사용해야 한다.
          const routeMode = {
            DRIVING: 'DRIVING',
            WALKING: 'WALKING',
            TRANSIT: 'TRANSIT',
            BICYCLING: 'BICYCLING'
          }[from.travel_mode] || 'DRIVING';

          // TRANSIT 경로의 여러 이동 구간(도보+철도 등)을 그리려면 legs도 요청해야 한다.
          const routeRequest = {
            origin,
            destination,
            travelMode: routeMode,
            fields: ['path', 'legs', 'distanceMeters', 'durationMillis']
          };

          const { routes } = await RouteClass.computeRoutes(routeRequest);
          if (!routes || !routes.length) {
            segmentTexts.push(`${i + 1}→${i + 2} 경로 없음`);
            continue;
          }
          const route = routes[0];
          const polylines = route.createPolylines();
          polylines.forEach(polyline => {
            polyline.setMap(map);
            mapPolylines.push(polyline);
          });
          const km = route.distanceMeters != null ? `${(route.distanceMeters / 1000).toFixed(1)}km` : '';
          const min = route.durationMillis != null ? `${Math.round(route.durationMillis / 60000)}분` : '';
          const modeLabel = { DRIVING: '자동차', WALKING: '도보', TRANSIT: '대중교통', BICYCLING: '자전거' }[from.travel_mode] || '이동';
          segmentTexts.push(`${i + 1}→${i + 2} ${modeLabel}${km || min ? ' · ' + [km, min].filter(Boolean).join(' · ') : ''}`);
        } catch (error) {
          console.warn('경로 계산 실패', error);
          const message = String(error?.message || error || '알 수 없는 오류');
          segmentTexts.push(`${i + 1}→${i + 2} 경로 실패 (${message})`);
        }
      }
      summary.textContent = segmentTexts.length ? segmentTexts.join(' / ') : '마커는 표시했지만 이동 경로 결과를 받지 못했어.';
    }

    async function deleteCurrentTrip() {
      if (!currentTrip) return;
      const ok = confirm(`“${currentTrip.title}” 여행과 그 안의 모든 일정을 삭제할까?\n이 작업은 되돌릴 수 없어.`);
      if (!ok) return;

      const { error } = await supabaseApp.from('trips').delete().eq('id', currentTrip.id);
      if (error) return showToast('여행 삭제 실패: ' + error.message, true);
      showToast('여행을 삭제했어.');
      goBackToTrips();
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function getDateForDay(day) {
      if (!currentTrip?.start_date) return null;
      const date = parseLocalDate(currentTrip.start_date);
      date.setDate(date.getDate() + day - 1);
      return toDateInputValue(date);
    }

    function parseLocalDate(value) {
      const [year, month, day] = value.split('-').map(Number);
      return new Date(year, month - 1, day);
    }

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatTripDates(start, end) {
      if (!start && !end) return '날짜 미정';
      if (start && !end) return `${formatKoreanDate(start)}부터`;
      if (!start && end) return `${formatKoreanDate(end)}까지`;
      return `${formatKoreanDate(start)} ~ ${formatKoreanDate(end)}`;
    }

    function formatKoreanDate(value) {
      if (!value) return '';
      const date = parseLocalDate(value);
      return new Intl.DateTimeFormat('ko-KR', { year: 'numeric', month: 'numeric', day: 'numeric' }).format(date);
    }

    function formatMoney(value, currency) {
      try {
        return new Intl.NumberFormat('ko-KR', { style: 'currency', currency: currency || 'KRW', maximumFractionDigits: 2 }).format(Number(value));
      } catch {
        return `${Number(value).toLocaleString()} ${currency || ''}`.trim();
      }
    }

    let toastTimer;
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = isError ? 'show error' : 'show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.className = ''; }, 3200);
    }
  </script>
</body>
</html>
