<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오사카 여행 플래너</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 16px; font-weight: bold; color: #6c757d; cursor: pointer; }
        .tab-btn.active { color: #4b0082; border-bottom: 3px solid #4b0082; }
        #map { height: 250px; width: 100%; border-radius: 8px; margin-bottom: 20px; background: #e9ecef; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .plan-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .add-btn { width: 100%; padding: 15px; background: #4b0082; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        
        /* 모달(팝업창) 스타일 */
        #addModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .modal-content input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .modal-buttons button { padding: 8px 15px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-cancel { background: #ccc; }
        .btn-save { background: #4b0082; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; color: #333;">오사카 4일 여행 계획표</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('day1', this, 1)">1일차</button>
            <button class="tab-btn" onclick="showTab('day2', this, 2)">2일차</button>
            <button class="tab-btn" onclick="showTab('day3', this, 3)">3일차</button>
            <button class="tab-btn" onclick="showTab('day4', this, 4)">4일차</button>
        </div>

        <div id="map"></div>

        <div id="day1" class="tab-content active"><h3>목요일 일정</h3><div class="plan-list"></div></div>
        <div id="day2" class="tab-content"><h3>금요일 일정</h3><div class="plan-list"></div></div>
        <div id="day3" class="tab-content"><h3>토요일 일정</h3><div class="plan-list"></div></div>
        <div id="day4" class="tab-content"><h3>일요일 일정</h3><div class="plan-list"></div></div>

        <!-- 💡 버튼 클릭 시 모달창 열림 -->
        <button class="add-btn" onclick="openModal()">+ 새 일정 추가하기</button>
    </div>

    <!-- 모달(팝업) 디자인 -->
    <div id="addModal">
        <div class="modal-content">
            <h3>일정 추가하기</h3>
            <input type="time" id="inputTime">
            <input type="text" id="inputPlace" placeholder="방문할 장소">
            <input type="number" id="inputJpy" placeholder="예상 경비 (엔화)">
            <input type="text" id="inputMemo" placeholder="메모 (선택)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-save" onclick="savePlan()">저장</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 수파베이스 설정 (본인의 키로 반드시 교체하세요!)
        const supabaseUrl = 'https://pbzwcsaveufsqbmhygon.supabase.co/rest/v1/';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiendjc2F2ZXVmc3FibWh5Z29uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTQ2MTgsImV4cCI6MjA5MDc3MDYxOH0.sq8gWEF7ntiA3pL9DeDQ59rVNuDzXBkJSDJmC2OHIOE';
        const supabaseApp = supabase.createClient(supabaseUrl, supabaseKey);

        let currentDayIndex = 1; // 현재 보고 있는 탭의 일자

        // 탭 전환 기능
        function showTab(dayId, btn, dayIndex) {
            currentDayIndex = dayIndex;
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(dayId).classList.add('active');
            btn.classList.add('active');
        }

        // 구글 맵 빈 영역 로드
        let map;
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 34.7024, lng: 135.4959 },
                zoom: 13,
            });
        }

        // 모달 열기/닫기
        function openModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('addModal').style.display = 'none';
        }

        // 수파베이스에 데이터 저장하기
        async function savePlan() {
            const time = document.getElementById('inputTime').value;
            const place = document.getElementById('inputPlace').value;
            const jpy = parseInt(document.getElementById('inputJpy').value) || 0;
            const krw = jpy * 9; // 원화 임시 환율 계산 (x9)
            const memo = document.getElementById('inputMemo').value;

            if (!time || !place) {
                alert("시간과 장소를 입력해주세요!");
                return;
            }

            const { data, error } = await supabaseApp
                .from('osaka_plans')
                .insert([{ 
                    day_index: currentDayIndex, 
                    time_str: time, 
                    place_name: place, 
                    jpy_cost: jpy, 
                    krw_cost: krw, 
                    memo_text: memo 
                }]);

            if (error) {
                console.error("에러 원인:", error);
                alert("일정 저장에 실패했습니다. (콘솔 창을 확인하세요)");
            } else {
                alert("성공적으로 저장되었습니다!");
                closeModal();
                // 저장 후 입력창 초기화
                document.getElementById('inputTime').value = '';
                document.getElementById('inputPlace').value = '';
                document.getElementById('inputJpy').value = '';
                document.getElementById('inputMemo').value = '';
            }
        }
    </script>
    
    <!-- 구글 맵 스크립트 (기존에 발급받으신 키를 유지해 주세요) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAw-sboIMyqehkNYYlB2URbuDpeIhZxwxA&callback=initMap" async defer></script>
</body>
</html>
