<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오사카 여행 플래너</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* 탭 버튼 스타일 */
        .tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; font-size: 16px; font-weight: bold; color: #6c757d; cursor: pointer; }
        .tab-btn.active { color: #4b0082; border-bottom: 3px solid #4b0082; }
        
        /* 지도 영역 */
        #map { height: 250px; width: 100%; border-radius: 8px; margin-bottom: 20px; background: #e9ecef; }
        
        /* 일정 리스트 스타일 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .plan-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .time { font-weight: bold; color: #4b0082; width: 60px; }
        .details { flex-grow: 1; }
        .place { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .cost { color: #e63946; font-size: 14px; }
        .memo { color: #6c757d; font-size: 12px; margin-top: 5px; }
        .add-btn { width: 100%; padding: 15px; background: #4b0082; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; color: #333;">오사카 여행 계획</h2>
        
        <!-- 탭 버튼 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('day1', this)">1일차</button>
            <button class="tab-btn" onclick="showTab('day2', this)">2일차</button>
            <button class="tab-btn" onclick="showTab('day3', this)">3일차</button>
            <button class="tab-btn" onclick="showTab('day4', this)">4일차</button>
        </div>

        <!-- 지도 영역 (여기에 구글 지도가 렌더링됩니다) -->
        <div id="map"></div>

        <!-- 1일차 일정 -->
        <div id="day1" class="tab-content active">
            <h3 style="padding-left: 10px;">목요일 일정</h3>
            <div class="plan-item">
                <div class="time">10:00</div>
                <div class="details">
                    <div class="place">간사이 공항 도착</div>
                    <div class="cost">예상: ¥0 (약 ₩0)</div>
                    <div class="memo">라피트 특급열차 탑승</div>
                </div>
            </div>
            <div class="plan-item">
                <div class="time">12:30</div>
                <div class="details">
                    <div class="place">도톤보리 타코야키</div>
                    <div class="cost">예상: ¥1,000 (약 ₩9,000)</div>
                    <div class="memo">도착하자마자 첫 끼!</div>
                </div>
            </div>
        </div>

        <!-- 2일차 일정 -->
        <div id="day2" class="tab-content">
            <h3 style="padding-left: 10px;">금요일 일정</h3>
            <div class="plan-item">
                <div class="time">10:00</div>
                <div class="details">
                    <div class="place">교토 당일치기 출발</div>
                    <div class="cost">예상: ¥2,000 (약 ₩18,000)</div>
                    <div class="memo">우메다역에서 한큐선 탑승</div>
                </div>
            </div>
        </div>

        <!-- 3일차 일정 -->
        <div id="day3" class="tab-content">
            <h3 style="padding-left: 10px;">토요일 일정</h3>
            <div class="plan-item">
                <div class="time">11:00</div>
                <div class="details">
                    <div class="place">우메다 백화점 쇼핑</div>
                    <div class="cost">예상: ¥15,000 (약 ₩135,000)</div>
                    <div class="memo">선물 사기</div>
                </div>
            </div>
        </div>

        <!-- 4일차 일정 -->
        <div id="day4" class="tab-content">
            <h3 style="padding-left: 10px;">일요일 일정</h3>
            <div class="plan-item">
                <div class="time">14:00</div>
                <div class="details">
                    <div class="place">간사이 공항으로 이동</div>
                    <div class="cost">예상: ¥1,500 (약 ₩13,500)</div>
                    <div class="memo">아쉬운 귀국</div>
                </div>
            </div>
        </div>

        <button class="add-btn">+ 새 일정 추가하기</button>
    </div>

    <!-- 탭 전환 및 구글 맵 초기화 스크립트 -->
    <script>
        // 탭 전환 기능
        function showTab(dayId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(dayId).classList.add('active');
            btn.classList.add('active');
        }

        // 구글 지도 초기화 함수 (오사카역 중심)
        let map;
        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 34.7024, lng: 135.4959 }, // 오사카역 좌표
                zoom: 13,
            });
        }
    </script>
    
    <!-- 💡 주의: 아래 YOUR_API_KEY_HERE 부분을 실제 발급받은 키로 바꿔야 지도가 뜹니다! -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAw-sboIMyqehkNYYlB2URbuDpeIhZxwxA&callback=initMap" async defer></script>
</body>
</html>
